<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الشبكة العربية الصغيرة</title>
  <meta name="description" content="مجموعة منتقاة من المدونات والمواقع الشخصية باللغة العربية">
  <meta name="author" content="Mohamed Elashri">
  <link rel="canonical" href="https://arsweb.net/">

  <meta property="og:title" content="الشبكة العربية الصغيرة">
  <meta property="og:description" content="مجموعة منتقاة من المدونات والمواقع الشخصية باللغة العربية">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://arsweb.net/">
  <meta property="og:image" content="https://arsweb.net/favicon.svg">
  <meta property="og:locale" content="ar_AR">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="الشبكة العربية الصغيرة">
  <meta name="twitter:description" content="مجموعة منتقاة من المدونات والمواقع الشخصية باللغة العربية">

  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="alternate" type="application/rss+xml" title="الشبكة العربية الصغيرة - RSS" href="rss.xml">

  <link rel="stylesheet" href="fonts/fonts.css">
  <link rel="stylesheet" href="style.css">

  <script>
    (function() {
      const theme = localStorage.getItem('theme');
      if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
</head>
<body>
  <header class="site-header">
    <nav class="nav">
      <a href="index.html" class="nav-logo">
        <img src="favicon.svg" alt="" class="logo-icon">
        الشبكة العربية الصغيرة
      </a>
      <div class="nav-links">
        <a href="about.html">عن المشروع</a>
        <a href="rss.xml" class="rss-link" aria-label="RSS Feed" title="RSS Feed">
          <img src="icon-rss.svg" alt="" class="rss-icon">
        </a>
        <button class="theme-toggle" aria-label="تبديل المظهر">
          <img src="icon-sun.svg" alt="" class="theme-icon theme-sun">
          <img src="icon-moon.svg" alt="" class="theme-icon theme-moon">
        </button>
      </div>
    </nav>
  </header>

  <main class="main">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <p>الشبكة العربية الصغيرة: أصوات عربية مستقلة على الويب</p>
    <a href="https://github.com/MohamedElashri/asw" target="_blank" rel="noopener" class="github-link">
      <img src="icon-github.svg" alt="" class="github-icon">
    </a>
  </footer>

  <script>
    document.querySelector('.theme-toggle').addEventListener('click', function() {
      const html = document.documentElement;
      const isDark = html.getAttribute('data-theme') === 'dark';
      html.setAttribute('data-theme', isDark ? 'light' : 'dark');
      localStorage.setItem('theme', isDark ? 'light' : 'dark');
    });
  </script>
</body>
</html>
